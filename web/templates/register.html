<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription — Forum.js</title>
    <link rel="stylesheet" href="../static/style.css">
</head>
<body>
    <div class="auth-page">
        <div class="auth-card card card--accent">
            <div class="logo">
                <div class="logo-icon">
                    <svg class="icon icon--logo" aria-hidden="true"><use href="../static/icons.svg#icon-forum"></use></svg>
                </div>
            </div>
            <h1>Créer un compte</h1>
            <p class="subtitle">Rejoignez la communauté Forum Project </p>

            <form action="/register" method="post">
                <label for="username">Nom d'utilisateur</label>
                <input type="text" id="username" name="username" placeholder="votre_pseudo" autocomplete="username" required>

                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" placeholder="vous@exemple.fr" autocomplete="email" required>

                <label for="password">Mot de passe</label>
                <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="new-password" required>

                <label for="password_confirm">Confirmer le mot de passe</label>
                <input type="password" id="password_confirm" name="password_confirm" placeholder="••••••••" autocomplete="new-password" required>

                <button type="submit">S'inscrire</button>
            </form>

            <p class="auth-footer">
                Déjà un compte ? <a href="login.html">Se connecter</a>
            </p>
            <p class="auth-footer">
                <a href="index.html">← Retour à l'accueil</a>
            </p>
        </div>
    </div>
</body>
</html>
